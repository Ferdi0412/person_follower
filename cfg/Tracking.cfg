#!/usr/bin/env python
PACKAGE = "person_follower"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

# 0 means use defaults
gen.add("iou",      double_t, 0, "IoU threshold for determinig a hit", 0.0, min=0.0, max=1.0)
gen.add("min_hits", int_t,    0, "Minimum hits to start tracking",     0,   min=0,   max=200)
gen.add("max_age",  int_t,    0, "Maximum misses before dropping",     0,   min=0,   max=200)

exit(gen.generate(PACKAGE, "person_follower", "Tracking"))
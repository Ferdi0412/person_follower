#!/usr/bin/env python
PACKAGE = "person_follower"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

# 0 means use model defaults
gen.add("detection_conf",  double_t, 1, "Detection confidence threshold",  0.0, min=0.0, max=1.0)
gen.add("detection_iou",   double_t, 1, "IoU threshold for detection NMS", 0.0, min=0.0, max=1.0)
gen.add("conf",            double_t, 2, "Per keypoint/landmark threshold", 0.0, min=0.0, max=1.0)
gen.add("roi",             double_t, 2, "Threshold for a 'good' ROI",      0.0, min=0.0, max=1.0)
gen.add("log_infer_time",  bool_t,   4, "Whether to log inference times",  False)
gen.add("log_full_time",   bool_t,   4, "Whether to log full loop times",  False)

exit(gen.generate(PACKAGE, "person_follower", "Pose"))